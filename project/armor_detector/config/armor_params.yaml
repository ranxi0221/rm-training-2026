armor_detector_node:
  ros__parameters:
    # ---- 基本设置 ----
    image_topic: "/image_raw"           # 订阅的图像话题
    target_color: "both"                # 目标颜色: "red" / "blue" / "both"
    enable_debug: true                  # 是否发布调试图像

    # ---- 预处理 ----
    brightness_alpha: 1.0               # 不降亮度（画面本身已经很暗）
    enable_clahe: false                 # 暗环境不需要CLAHE
    clahe_clip: 1.5
    clahe_tile: 8

    # ---- 红色 HSV 阈值 ----
    red1_h_low: 0
    red1_h_high: 10
    red1_s_low: 30
    red1_s_high: 255
    red1_v_low: 100
    red1_v_high: 255
    # 浅红 / 过曝段（H: 170~179）
    red2_h_low: 170
    red2_h_high: 179
    red2_s_low: 30
    red2_s_high: 255
    red2_v_low: 100
    red2_v_high: 255

    # ---- 蓝色 HSV 阈值 ----
    blue_h_low: 100
    blue_h_high: 125
    blue_s_low: 40
    blue_s_high: 255
    blue_v_low: 150
    blue_v_high: 255

    # ---- 形态学去噪 ----
    morph_kernel_size: 3
    enable_morph_open: true
    enable_morph_close: true

    # ---- 灯条筛选 ----
    light_min_area: 20.0
    light_max_area: 50000.0
    light_max_ratio: 0.6

    # ---- 装甲板配对 ----
    pair_max_dy: 400.0
    pair_min_dx: 5.0
    pair_max_dx: 2500.0

    # ---- 时序平滑 ----
    smooth_alpha: 0.4

    # ---- 自适应亮度 ----
    enable_adaptive_brightness: false
    digit_model_path: ""
